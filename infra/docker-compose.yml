services:
  neo4j:
    image: neo4j:5.20
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: graphbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

  cassandra:
    image: cassandra:4.1
    profiles: ["janusgraph"]
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra

  janusgraph:
    image: janusgraph/janusgraph:1.0.0
    profiles: ["janusgraph"]
    depends_on:
      - cassandra
    ports:
      - "8182:8182"
    environment:
      JANUS_PROPS_TEMPLATE: cql-es
      storage.backend: cql
      storage.hostname: cassandra

volumes:
  neo4j-data:
  postgres-data:
  cassandra-data:
